name: Release

# Triggers when you push a tag like `v1.0.0-beta` to the repository.
#   git tag v1.0.0-beta && git push origin v1.0.0-beta
#
# Produces a GitHub Release (pre-release) for the tag with:
#   - Android: split APKs (arm64-v8a, armeabi-v7a, x86, x86_64) + a universal APK
#   - Windows: .msi installer
#   - Linux:   .deb + .AppImage
#   - macOS:   .dmg
#
# Android signing (optional): add repo secrets NEKUVA_KEYSTORE_BASE64 (base64 of nekuva.jks),
# NEKUVA_STORE_PASSWORD, NEKUVA_KEY_ALIAS, NEKUVA_KEY_PASSWORD. Without them the APKs are debug-signed
# (installable for beta testing, but not upgrade-compatible with a real-key release).
# Telegram backup: optional secret TG_BACKUP_BOT_TOKEN.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the (pre)release first with the notes, so the platform jobs only attach files and never
  # overwrite the body.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so we can diff against the previous tag
      # Build the release body ourselves: curated intro + a COMMIT list (subject + short SHA + @author)
      # for every commit since the previous tag, a Contributors list, and the compare link. GitHub's
      # generate_release_notes is PR-based; this repo commits straight to main, so we list commits via
      # the compare API (which also resolves each commit's GitHub @login) instead.
      - name: Build release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          NEW="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          cat > release_notes.md <<'INTRO'
          This is a **beta** build of Nekuva for user testing.

          Nekuva is a Kotlin Multiplatform manga reader (Kotatsu/Doki lineage), rewritten in Compose
          Multiplatform and now running on **Android, Windows, Linux, and macOS**.

          ## Downloads
          - **Android** — `…-android-universal.apk` if unsure, or match your CPU (`arm64-v8a` for most phones).
          - **Windows** — `…-windows-x64.msi`
          - **Linux** — `…-linux-amd64.deb` or `…-linux-x86_64.AppImage`
          - **macOS** — `…-macos.dmg`

          ## Notes
          - **macOS:** the `.dmg` is unsigned / un-notarized → right-click the app and choose **Open** to bypass Gatekeeper.
          - This is a **beta** — expect rough edges; please report any bugs you find.
          INTRO
          {
            echo
            if [ -n "$PREV" ]; then
              gh api "repos/${GITHUB_REPOSITORY}/compare/${PREV}...${NEW}" > compare.json
              echo "## What's Changed"
              jq -r '.commits[] | "* " + (.commit.message | split("\n")[0]) + " `" + .sha[0:7] + "` " + (if .author then "@" + .author.login else .commit.author.name end)' compare.json
              echo
              echo "## Contributors"
              jq -r '[.commits[] | if .author then "@" + .author.login else .commit.author.name end] | unique | .[] | "* " + .' compare.json
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${NEW}"
            else
              echo "## What's Changed"
              git log --pretty='* %s `%h` %an'
            fi
          } >> release_notes.md
          echo "----- generated release notes -----"
          cat release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          body_path: release_notes.md

  android:
    name: Android APKs
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # Write the keystore from the secret (if set) and expose NEKUVA_STORE_FILE for the build. The
      # `secrets` context isn't allowed in `if:`, so we gate in the shell using a step-level env var.
      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.NEKUVA_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > nekuva.jks
            echo "NEKUVA_STORE_FILE=nekuva.jks" >> "$GITHUB_ENV"
            echo "Release keystore configured."
          else
            echo "No keystore secret — release will be debug-signed."
          fi
      - name: Build release APKs
        env:
          NEKUVA_STORE_PASSWORD: ${{ secrets.NEKUVA_STORE_PASSWORD }}
          NEKUVA_KEY_ALIAS: ${{ secrets.NEKUVA_KEY_ALIAS }}
          NEKUVA_KEY_PASSWORD: ${{ secrets.NEKUVA_KEY_PASSWORD }}
          TG_BACKUP_BOT_TOKEN: ${{ secrets.TG_BACKUP_BOT_TOKEN }}
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          # jpackage/MSI/DMG installer version needs MAJOR > 0; 0.0.x betas fall back to 1.0.0.
          if [ "${NUMERIC%%.*}" = "0" ]; then DESKTOP_VER="1.0.0"; else DESKTOP_VER="$NUMERIC"; fi
          ./gradlew :composeApp:assembleRelease \
            -PappVersionName="$VERSION" \
            -PappVersionCode=${{ github.run_number }} \
            -PdesktopPackageVersion="$DESKTOP_VER"
      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for f in composeApp/build/outputs/apk/release/composeApp-*-release.apk; do
            abi="$(basename "$f" | sed -E 's/^composeApp-(.*)-release\.apk$/\1/')"
            cp "$f" "dist/Nekuva-${VERSION}-android-${abi}.apk"
          done
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: dist/*.apk

  windows:
    name: Windows installer (.msi)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # jpackage needs WiX Toolset 3.x for the .msi. windows-latest already ships WiX 3.14, so only
      # install if missing — and never fail the step (choco exits non-zero when a newer version exists).
      - name: Ensure WiX Toolset 3
        shell: bash
        run: choco install wixtoolset -y --no-progress || echo "WiX already present — continuing."
      - name: Build MSI
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          # jpackage/MSI/DMG installer version needs MAJOR > 0; 0.0.x betas fall back to 1.0.0.
          if [ "${NUMERIC%%.*}" = "0" ]; then DESKTOP_VER="1.0.0"; else DESKTOP_VER="$NUMERIC"; fi
          ./gradlew :composeApp:packageMsi \
            -PappVersionName="$VERSION" -PdesktopPackageVersion="$DESKTOP_VER"
      - name: Collect MSI
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          msi="$(ls composeApp/build/compose/binaries/main/msi/*.msi | head -n1)"
          cp "$msi" "dist/Nekuva-${VERSION}-windows-x64.msi"
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: dist/*.msi

  linux:
    name: Linux installers (.deb, .AppImage)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils file
      - name: Build .deb + app image
        shell: bash
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          # jpackage/MSI/DMG installer version needs MAJOR > 0; 0.0.x betas fall back to 1.0.0.
          if [ "${NUMERIC%%.*}" = "0" ]; then DESKTOP_VER="1.0.0"; else DESKTOP_VER="$NUMERIC"; fi
          ./gradlew :composeApp:packageDeb :composeApp:createDistributable \
            -PappVersionName="$VERSION" -PdesktopPackageVersion="$DESKTOP_VER"
      - name: Build .AppImage
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPDIR="Nekuva.AppDir"
          APPRUNTIME="$(ls -d composeApp/build/compose/binaries/main/app/Nekuva)"
          rm -rf "$APPDIR" && mkdir -p "$APPDIR/usr"
          cp -r "$APPRUNTIME"/* "$APPDIR/usr/"
          cp composeApp/src/desktopMain/resources/nekuva_icon.png "$APPDIR/nekuva.png"
          cat > "$APPDIR/nekuva.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Nekuva
          Exec=Nekuva
          Icon=nekuva
          Categories=Graphics;Viewer;
          DESKTOP
          cat > "$APPDIR/AppRun" <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Nekuva" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run "$APPDIR" "Nekuva-${VERSION}-linux-x86_64.AppImage"
      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          deb="$(ls composeApp/build/compose/binaries/main/deb/*.deb | head -n1)"
          cp "$deb" "dist/Nekuva-${VERSION}-linux-amd64.deb"
          cp "Nekuva-${VERSION}-linux-x86_64.AppImage" dist/
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/*.deb
            dist/*.AppImage

  macos:
    name: macOS installer (.dmg)
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build .dmg
        shell: bash
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          # jpackage/MSI/DMG installer version needs MAJOR > 0; 0.0.x betas fall back to 1.0.0.
          if [ "${NUMERIC%%.*}" = "0" ]; then DESKTOP_VER="1.0.0"; else DESKTOP_VER="$NUMERIC"; fi
          ./gradlew :composeApp:packageDmg \
            -PappVersionName="$VERSION" -PdesktopPackageVersion="$DESKTOP_VER"
      - name: Collect DMG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          dmg="$(ls composeApp/build/compose/binaries/main/dmg/*.dmg | head -n1)"
          cp "$dmg" "dist/Nekuva-${VERSION}-macos.dmg"
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: dist/*.dmg
