name: Release

# Triggers when you push a tag like `v1.0.0-beta` to the repository.
#   git tag v1.0.0-beta && git push origin v1.0.0-beta
#
# Produces a GitHub Release (pre-release) for the tag with:
#   - Android: split APKs (arm64-v8a, armeabi-v7a, x86, x86_64) + a universal APK
#   - Windows: .msi installer
#   - Linux:   .deb + .AppImage
#   - macOS:   .dmg
#
# Android signing (optional): add repo secrets NEKUVA_KEYSTORE_BASE64 (base64 of nekuva.jks),
# NEKUVA_STORE_PASSWORD, NEKUVA_KEY_ALIAS, NEKUVA_KEY_PASSWORD. Without them the APKs are debug-signed
# (installable for beta testing, but not upgrade-compatible with a real-key release).
# Telegram backup: optional secret TG_BACKUP_BOT_TOKEN.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the (pre)release first with the notes, so the platform jobs only attach files and never
  # overwrite the body.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: true
          body: |
            ## Nekuva ${{ github.ref_name }} — beta

            Build untuk **user testing**. Pilih file sesuai platform Anda:

            - **Android** — kalau ragu pilih `…-android-universal.apk` (atau sesuai CPU HP: `arm64-v8a` untuk mayoritas perangkat).
            - **Windows** — `…-windows-x64.msi`
            - **Linux** — `…-linux-amd64.deb` atau `…-linux-x86_64.AppImage`
            - **macOS** — `…-macos.dmg`

            ### Catatan
            - **macOS `.dmg` belum di-sign / notarize → klik-kanan aplikasinya lalu pilih *Open* untuk melewati Gatekeeper.**
            - Ini build **beta**, masih mungkin ada bug — mohon laporkan temuan Anda.

  android:
    name: Android APKs
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Decode signing keystore
        if: ${{ secrets.NEKUVA_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.NEKUVA_KEYSTORE_BASE64 }}" | base64 -d > nekuva.jks
      - name: Build release APKs
        env:
          NEKUVA_STORE_FILE: ${{ secrets.NEKUVA_KEYSTORE_BASE64 != '' && 'nekuva.jks' || '' }}
          NEKUVA_STORE_PASSWORD: ${{ secrets.NEKUVA_STORE_PASSWORD }}
          NEKUVA_KEY_ALIAS: ${{ secrets.NEKUVA_KEY_ALIAS }}
          NEKUVA_KEY_PASSWORD: ${{ secrets.NEKUVA_KEY_PASSWORD }}
          TG_BACKUP_BOT_TOKEN: ${{ secrets.TG_BACKUP_BOT_TOKEN }}
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          ./gradlew :composeApp:assembleRelease \
            -PappVersionName="$VERSION" \
            -PappVersionCode=${{ github.run_number }} \
            -PdesktopPackageVersion="$NUMERIC"
      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for f in composeApp/build/outputs/apk/release/composeApp-*-release.apk; do
            abi="$(basename "$f" | sed -E 's/^composeApp-(.*)-release\.apk$/\1/')"
            cp "$f" "dist/Nekuva-${VERSION}-android-${abi}.apk"
          done
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: dist/*.apk

  windows:
    name: Windows installer (.msi)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # jpackage needs WiX Toolset 3.x to build an .msi.
      - name: Install WiX Toolset 3
        run: choco install wixtoolset --version=3.11.2 -y --no-progress
      - name: Build MSI
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          ./gradlew :composeApp:packageMsi \
            -PappVersionName="$VERSION" -PdesktopPackageVersion="$NUMERIC"
      - name: Collect MSI
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          msi="$(ls composeApp/build/compose/binaries/main/msi/*.msi | head -n1)"
          cp "$msi" "dist/Nekuva-${VERSION}-windows-x64.msi"
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: dist/*.msi

  linux:
    name: Linux installers (.deb, .AppImage)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils file
      - name: Build .deb + app image
        shell: bash
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          ./gradlew :composeApp:packageDeb :composeApp:createDistributable \
            -PappVersionName="$VERSION" -PdesktopPackageVersion="$NUMERIC"
      - name: Build .AppImage
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPDIR="Nekuva.AppDir"
          APPRUNTIME="$(ls -d composeApp/build/compose/binaries/main/app/Nekuva)"
          rm -rf "$APPDIR" && mkdir -p "$APPDIR/usr"
          cp -r "$APPRUNTIME"/* "$APPDIR/usr/"
          cp composeApp/src/desktopMain/resources/nekuva_icon.png "$APPDIR/nekuva.png"
          cat > "$APPDIR/nekuva.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Nekuva
          Exec=Nekuva
          Icon=nekuva
          Categories=Graphics;Viewer;
          DESKTOP
          cat > "$APPDIR/AppRun" <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Nekuva" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run "$APPDIR" "Nekuva-${VERSION}-linux-x86_64.AppImage"
      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          deb="$(ls composeApp/build/compose/binaries/main/deb/*.deb | head -n1)"
          cp "$deb" "dist/Nekuva-${VERSION}-linux-amd64.deb"
          cp "Nekuva-${VERSION}-linux-x86_64.AppImage" dist/
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            dist/*.deb
            dist/*.AppImage

  macos:
    name: macOS installer (.dmg)
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build .dmg
        shell: bash
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          NUMERIC="${VERSION%%-*}"
          ./gradlew :composeApp:packageDmg \
            -PappVersionName="$VERSION" -PdesktopPackageVersion="$NUMERIC"
      - name: Collect DMG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          dmg="$(ls composeApp/build/compose/binaries/main/dmg/*.dmg | head -n1)"
          cp "$dmg" "dist/Nekuva-${VERSION}-macos.dmg"
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nekuva ${{ github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: dist/*.dmg
